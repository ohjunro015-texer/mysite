<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ciúnascoill</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      font-family: "Georgia", serif;
      color: #f5f3ea;
      text-align: center;

      background: url("bg.png") center center / cover no-repeat fixed;
    }

    .overlay {
      background: rgba(0, 0, 0, 0.18);
      padding: 3rem 4rem;
      border-radius: 16px;
      backdrop-filter: blur(2px);
      max-width: 700px;
    }

    h1 {
      font-size: 3rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      margin-bottom: 1.2rem;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.9;
      letter-spacing: 0.04em;
    }

    .sub {
      margin-top: 1.5rem;
      font-size: 0.95rem;
      opacity: 0.9;
    }

    @media (max-width: 768px) {
      .overlay {
        margin: 1.5rem;
        padding: 2rem;
      }

      h1 {
        font-size: 2rem;
      }

      p {
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>
  <div class="overlay">
    <h1>ciúnascoill.com</h1>

    <p>
      個人の趣味によるドメインです。<br>
      このサイトを公開する予定はありません。
    </p>

    <p class="sub">
      Not open to the public.
    </p>
  </div>
</body>
</html>
